name: Deploy to VPS on main

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script_stop: true
          envs: APP_DIR,REPO_URL,BRANCH
          script: |
            export APP_DIR="${{ secrets.VPS_APP_DIR }}"
            export REPO_URL="${{ secrets.VPS_REPO_URL }}"
            export BRANCH="main"
            bash -lc '
              set -euo pipefail
              if [[ ! -d "$APP_DIR" ]]; then
                sudo mkdir -p "$APP_DIR"
                sudo chown -R "$USER":"$USER" "$APP_DIR"
              fi
              if [[ ! -d "$APP_DIR/.git" ]]; then
                git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
              fi
              cd "$APP_DIR"
              git fetch --all --prune
              git checkout "$BRANCH"
              git pull --ff-only origin "$BRANCH"
              chmod +x ./scripts/ci-deploy-vps.sh ./deploy.sh
              APP_DIR="$APP_DIR" REPO_URL="$REPO_URL" BRANCH="$BRANCH" ./scripts/ci-deploy-vps.sh
            '
