services:
  postgres:
    image: postgres:16
    container_name: fintech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fintech-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ledger-service:
    image: node:22-alpine
    container_name: ledger-service
    working_dir: /app
    command: sh -c "yarn install && yarn dev"
    volumes:
      - ../services/ledger-service:/app
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      ORIGIN: "*"
      JWT_SECRET: super-secret-change-me
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: ledger_db
    depends_on:
      postgres:
        condition: service_healthy

  transaction-service:
    image: node:22-alpine
    container_name: transaction-service
    working_dir: /app
    command: sh -c "yarn install && yarn dev"
    volumes:
      - ../services/transaction-service:/app
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      ORIGIN: "*"
      JWT_SECRET: super-secret-change-me
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: transaction_db
      LEDGER_SERVICE_URL: http://ledger-service:3001
      IDEMPOTENCY_TTL_MINUTES: 10
      RECOVERY_INTERVAL_MS: 30000
      RECOVERY_MAX_RETRIES: 5
      RECOVERY_BASE_DELAY_MS: 5000
    depends_on:
      postgres:
        condition: service_healthy
      ledger-service:
        condition: service_started

  account-service:
    image: node:22-alpine
    container_name: account-service
    working_dir: /app
    command: sh -c "yarn install && yarn dev"
    volumes:
      - ../services/account-service:/app
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      ORIGIN: "*"
      JWT_SECRET: super-secret-change-me
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: account_db
      LEDGER_SERVICE_URL: http://ledger-service:3001
    depends_on:
      postgres:
        condition: service_healthy
      ledger-service:
        condition: service_started

  fx-service:
    image: node:22-alpine
    container_name: fx-service
    working_dir: /app
    command: sh -c "yarn install && yarn dev"
    volumes:
      - ../services/fx-service:/app
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      ORIGIN: "*"
      JWT_SECRET: super-secret-change-me
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: fx_db
    depends_on:
      postgres:
        condition: service_healthy

  payroll-service:
    image: node:22-alpine
    container_name: payroll-service
    working_dir: /app
    command: sh -c "yarn install && yarn dev"
    volumes:
      - ../services/payroll-service:/app
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      ORIGIN: "*"
      JWT_SECRET: super-secret-change-me
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: payroll_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TRANSACTION_SERVICE_URL: http://transaction-service:3002
      PAYROLL_QUEUE_NAME: payroll-queue
      PAYROLL_JOB_ATTEMPTS: 5
      PAYROLL_BACKOFF_MS: 5000
      PAYROLL_WORKER_CONCURRENCY: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      transaction-service:
        condition: service_started

  admin-service:
    image: node:22-alpine
    container_name: admin-service
    working_dir: /app
    command: sh -c "yarn install && yarn dev"
    volumes:
      - ../services/admin-service:/app
    ports:
      - "3006:3006"
    environment:
      PORT: 3006
      ORIGIN: "*"
      JWT_SECRET: super-secret-change-me
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: admin_db
      TRANSACTION_SERVICE_URL: http://transaction-service:3002
      LEDGER_SERVICE_URL: http://ledger-service:3001
    depends_on:
      postgres:
        condition: service_healthy
      transaction-service:
        condition: service_started
      ledger-service:
        condition: service_started

  auth-service:
    image: node:22-alpine
    container_name: auth-service
    working_dir: /app
    command: sh -c "yarn install && yarn dev"
    volumes:
      - ../services/auth-service:/app
    ports:
      - "3008:3008"
    environment:
      PORT: 3008
      ORIGIN: "*"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: auth_db
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_DAYS: 7
      JWT_KID: fintech-auth-v1
      AUTH_PRIVATE_KEY: ${AUTH_PRIVATE_KEY}
      AUTH_PUBLIC_KEY: ${AUTH_PUBLIC_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    image: nginx:stable-alpine
    container_name: fintech-api-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      ledger-service:
        condition: service_started
      transaction-service:
        condition: service_started
      account-service:
        condition: service_started
      fx-service:
        condition: service_started
      payroll-service:
        condition: service_started
      admin-service:
        condition: service_started
      auth-service:
        condition: service_started

  prometheus:
    image: prom/prometheus:latest
    container_name: fintech-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      transaction-service:
        condition: service_started
      ledger-service:
        condition: service_started
      payroll-service:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    container_name: fintech-grafana
    ports:
      - "3007:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
