worker_processes auto;

events { 
  worker_connections 1024;
 } 

http {
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  client_max_body_size 10M;  # 🔥 limit body size

  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # 🔥 rate limiting
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

  log_format json_combined escape=json
    '{"time":"$time_iso8601","remote_addr":"$remote_addr","request_id":"$request_id",'
    '"request":"$request","status":$status,"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,"upstream_time":"$upstream_response_time","upstream_addr":"$upstream_addr"}';

  access_log /var/log/nginx/access.log json_combined;
  error_log /var/log/nginx/error.log warn;

  map $http_x_correlation_id $correlation_id {
    default $http_x_correlation_id;
    "" $request_id;
  }

  server {
    listen 80;
    server_name _;

    # 🔒 security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Correlation-ID $correlation_id;
    proxy_set_header Connection "";

    # 🔥 timeouts (VERY IMPORTANT)
    proxy_connect_timeout 5s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;

    # 🔥 CORS + OPTIONS safe handling
    location / {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type";
        return 204;
      }
    }

    # 📘 aggregated Swagger UI at gateway
    location = /docs {
      return 302 /docs/;
    }
    location /docs/ {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /docs/index.html;
    }

    # 📘 OpenAPI specs proxied through gateway
    location = /openapi/ledger.json {
      proxy_pass http://ledger-service:3001/openapi.json;
    }
    location = /openapi/transaction.json {
      proxy_pass http://transaction-service:3002/openapi.json;
    }
    location = /openapi/account.json {
      proxy_pass http://account-service:3003/openapi.json;
    }
    location = /openapi/fx.json {
      proxy_pass http://fx-service:3004/openapi.json;
    }
    location = /openapi/payroll.json {
      proxy_pass http://payroll-service:3005/openapi.json;
    }
    location = /openapi/admin.json {
      proxy_pass http://admin-service:3006/openapi.json;
    }
    location = /openapi/auth.json {
      proxy_pass http://auth-service:3008/openapi.json;
    }

    # 🔐 auth failure
    error_page 401 = @auth_unauthorized;
    location @auth_unauthorized {
      add_header Content-Type application/json;
      return 401 '{"success":false,"message":"Unauthorized"}';
    }

    # 🔐 internal auth check
    location = /_auth {
      internal;
      proxy_pass http://auth-service:3008/api/auth/validate;
      proxy_set_header Content-Length "";
      proxy_pass_request_body off;
      proxy_set_header Authorization $http_authorization;
      proxy_set_header X-Correlation-ID $correlation_id;
    }

    # 🔓 public auth routes
    location /api/auth {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass http://auth-service:3008;
    }

    # 🔁 macro-like block (copy pattern)

    location /api/ledger {
      limit_req zone=api_limit burst=20 nodelay;

      auth_request /_auth;
      auth_request_set $auth_user_id $upstream_http_x_user_id;
      auth_request_set $auth_user_role $upstream_http_x_user_role;

      proxy_set_header X-Auth-Verified true;
      proxy_set_header X-User-Id $auth_user_id;
      proxy_set_header X-User-Role $auth_user_role;

      proxy_pass http://ledger-service:3001;
    }

    location /api/transactions {
      limit_req zone=api_limit burst=20 nodelay;

      auth_request /_auth;
      auth_request_set $auth_user_id $upstream_http_x_user_id;
      auth_request_set $auth_user_role $upstream_http_x_user_role;

      proxy_set_header X-Auth-Verified true;
      proxy_set_header X-User-Id $auth_user_id;
      proxy_set_header X-User-Role $auth_user_role;

      proxy_pass http://transaction-service:3002;
    }

    location /api/accounts {
      limit_req zone=api_limit burst=20 nodelay;

      auth_request /_auth;
      auth_request_set $auth_user_id $upstream_http_x_user_id;
      auth_request_set $auth_user_role $upstream_http_x_user_role;

      proxy_set_header X-Auth-Verified true;
      proxy_set_header X-User-Id $auth_user_id;
      proxy_set_header X-User-Role $auth_user_role;

      proxy_pass http://account-service:3003;
    }

    location /api/fx {
      limit_req zone=api_limit burst=20 nodelay;

      auth_request /_auth;
      proxy_pass http://fx-service:3004;
    }

    location /api/payroll {
      limit_req zone=api_limit burst=10 nodelay; # stricter

      auth_request /_auth;
      proxy_pass http://payroll-service:3005;
    }

    location /api/admin {
      limit_req zone=api_limit burst=5 nodelay; # strict

      auth_request /_auth;
      proxy_pass http://admin-service:3006;
    }

    # 🩺 gateway health
    location = /api/health {
      add_header Content-Type application/json;
      return 200 '{"status":"gateway up"}';
    }
  }
}