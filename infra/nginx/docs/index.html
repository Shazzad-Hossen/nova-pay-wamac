<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fintech API Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
    <style>
      body { margin: 0; background: #fafafa; }
      .topbar { display: none; }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
    <script>
      window.ui = SwaggerUIBundle({
        dom_id: '#swagger-ui',
        urls: [
          { name: 'auth-service', url: '/openapi/auth.json' },
          { name: 'ledger-service', url: '/openapi/ledger.json' },
          { name: 'transaction-service', url: '/openapi/transaction.json' },
          { name: 'account-service', url: '/openapi/account.json' },
          { name: 'fx-service', url: '/openapi/fx.json' },
          { name: 'payroll-service', url: '/openapi/payroll.json' },
          { name: 'admin-service', url: '/openapi/admin.json' }
        ],
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
        layout: 'StandaloneLayout',
        deepLinking: true
      });
    </script>
  </body>
</html>
